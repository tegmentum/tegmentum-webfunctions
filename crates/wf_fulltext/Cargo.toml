[package]
name = "wf_fulltext"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
# Native mock server for tests — hand-rolled TcpListener + std::io, no
# third-party HTTP client needed. serde_json is already a runtime dep.

[package.metadata.component]
package = "wf:fulltext"

[package.metadata.component.target]
path = "wit"
world = "fulltext"
