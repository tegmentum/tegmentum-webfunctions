[package]
name = "wf_fulltext"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Match the runtime the other tegmentum:webfunction-based extension
# crates use (json_path, example-uppercase-extension, ...).
wit-bindgen-rt = { version = "0.44", features = ["bitflags"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
# Native mock server for tests — hand-rolled TcpListener + std::io, no
# third-party HTTP client needed. serde_json is already a runtime dep.

[package.metadata.component]
package = "stardog:wf-fulltext"

[package.metadata.component.target]
path = "wit"
world = "fulltext-extension"

[package.metadata.component.target.dependencies]
# Shared tegmentum:webfunction@0.1.0 WIT — types, extension surface,
# host-callbacks, and the well-known-exports memo's search / execute
# / embed named interfaces. Sourced from the wit/ submodule at the
# workspace root; the deps/ subdirectory is a symlink for
# wasm-tools compatibility, but cargo-component's target resolver
# needs the explicit registration here.
"tegmentum:webfunction" = { path = "../../wit" }
