[package]
name = "wf_sagegraph"
version.workspace = true
edition.workspace = true
license.workspace = true

# Guest wasm component. v0.3 replaces the v0.2 stubbed linear
# projection with real ONNX inference via `tract-onnx` — a pure-Rust
# ONNX runtime that compiles cleanly to `wasm32-wasip1` with no
# external native deps (no WebGPU, no wasi-nn, no libonnxruntime).
#
# Runtime-selection notes (kept in Cargo.toml so future readers see
# them alongside the pin):
#   * `wasi-nn` was the architecturally preferred path — a WASI-native
#     ML interface that would let the substrate host the runtime.
#
#     v0.4 substrate landing (this session): the product decision to
#     accept libonnxruntime as an engine-substrate dep was taken.
#     `wasmtime-wasi-nn = { version = "46", default-features = false,
#     features = ["onnx"] }` is now registered on oxigraph-wf and
#     qlever-wf-runtime (see each engine's Cargo.toml + linker file).
#     `ort` is pinned to `=2.0.0-rc.10` on both engines because the
#     wasmtime-wasi-nn 46.0.1 source uses ort's now-private
#     `Session::outputs` field, which was renamed in rc.11+. Build
#     env: `ORT_STRATEGY=system ORT_PREFER_DYNAMIC_LINK=1
#     ORT_LIB_LOCATION=/opt/homebrew` on macOS. Resulting binaries
#     dynamically link `libonnxruntime.dylib` (1.25.0 via Homebrew,
#     ~40 MB) at runtime.
#
#     GUEST-SIDE STATUS — deferred to v0.5. Adding wasi:nn imports
#     to the wf-sagegraph WIT world here would make this guest fail
#     to instantiate on Jena / RDF4J (JVM engines don't yet register
#     wasi:nn — wasmtime4j does not expose it). Two clean landings
#     for that:
#       (a) `wasmtime4j` gains a wasi:nn registration surface, and
#           we register it symmetrically on the JVM engines. Then a
#           single guest imports wasi:nn on every substrate.
#       (b) Ship TWO guest wasms: `wf_sagegraph.wasm` (tract, this
#           crate's default build, universal) and
#           `wf_sagegraph_nn.wasm` (wasi:nn, requires substrate
#           support). Substrate operators pick which URL to load per
#           deployment.
#     The tract-onnx path in this crate remains the shipping default
#     — pure Rust, ~2 MB compiled, deterministic across engines,
#     byte-identical output across all four substrates.
#
#     The v0.4 substrate binding also unblocks composition of
#     `~/git/fastembed-wasm/fastembed-component` on the two Rust
#     engines: fastembed imports
#     `wasi:nn/{tensor,graph,inference,errors}@0.2.0-rc-2024-10-28`
#     and those imports now resolve. Wiring the composition into
#     this crate is separate v0.5 work (cargo-component + wasm-tools
#     compose in the build graph).
#
#   * `wonnx` — WebGPU-backed; disabled backend still pulls in
#     wgpu-hal build deps that don't cleanly cross-compile to
#     wasm32-wasip1 in a single session.
#   * `onnxruntime-wasm` (Microsoft) — wraps libonnxruntime through
#     wasi-nn; same wall as option 1.
#   * `tract-onnx` — pure Rust, no C deps, no WebGPU, no wasi-nn.
#     Compiles clean, runs deterministically across engines.
#
# Fallback: when `model_url` is empty the guest still emits the
# deterministic hash-seeded projection from v0.2 so cases without a
# real model keep byte-stable output.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
# Runtime for cargo-component's generated bindings. Matches the
# version other tegmentum:webfunction-based extension crates use
# (json_path, example-uppercase-extension, wf_fulltext).
wit-bindgen-rt = { version = "0.44", features = ["bitflags"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Pure-Rust ONNX runtime; the pin lives here (not in
# `workspace.dependencies`) because no other guest needs it and
# tract's dep tree is large enough that pulling it into the workspace
# root would slow every crate's initial build. tract 0.21 is the
# actively maintained line as of the v0.3 landing; it builds green
# for `wasm32-wasip1` with no additional features. `default-features
# = false` shaves the tract-onnx-opl "extra ops" surface we don't need
# and keeps the compiled wasm small (~2 MB with LTO).
tract-onnx = { version = "0.21", default-features = false }

# Pure-Rust GraphBLAS sparse-matrix core from ~/git/graphblas-wasm.
# We consume the `graphblas-sparse` crate directly (not the
# `graphblas-component` cdylib) because it has no wit-bindgen /
# no cdylib / no wasm-only deps — plain Rust that compiles to
# both wasm32-wasip1 and the native host build. Composing the
# WIT component form would need `wasm-tools compose` in the build,
# which is the same toolchain wall the ONNX composition attempt hit;
# consuming the Rust crate directly avoids it.
#
# Path dep pointing at the sibling git checkout. If a future move
# publishes `graphblas-sparse` to a registry, flip this to a version
# pin without touching the guest source.
graphblas-sparse = { path = "../../../graphblas-wasm/crates/sparse" }

[package.metadata.component]
package = "stardog:wf-sagegraph"

[package.metadata.component.target]
path = "wit"
world = "sagegraph-extension"

[package.metadata.component.target.dependencies]
# Shared tegmentum:webfunction@0.1.0 WIT — brings in the
# well-known-exports memo's `embed` named interface plus the
# `sparql-extension` include (empty registries for filter /
# aggregate / property-function under this guest).
"tegmentum:webfunction" = { path = "../../wit" }
