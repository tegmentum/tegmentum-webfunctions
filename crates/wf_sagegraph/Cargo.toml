[package]
name = "wf_sagegraph"
version.workspace = true
edition.workspace = true
license.workspace = true

# Guest wasm component. v0.2 ships the three exports (`embed` / `sweep`
# / `search`) with real wit-bindgen bindings and the ONNX-inference path
# STUBBED per the wf-sagegraph task brief's honest-failure escape.
#
# The stubbed path: mean-pool over structural neighbor features, then a
# deterministic linear projection whose weights are derived from a hash
# of `model-url`, followed by tanh activation. This gives byte-stable
# vectors per `model-url` so the substrate ABI is honestly exercised
# end-to-end; v0.3 replaces the projection with real `onnxruntime-wasm`
# / `wonnx-wasm` without a WIT churn.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wit-bindgen.workspace = true
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[package.metadata.component]
package = "wf:sagegraph"

[package.metadata.component.target]
path = "wit"
world = "wf-sagegraph"
