[package]
name = "string_lang_lingua_all_languages_with_cyrillic_script"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["cdylib"]

[dependencies]
wit-bindgen-rt = { version = "0.44", features = ["bitflags"] }
lingua = { version = "1.8", default-features = false, features = ["english", "spanish", "french", "german", "italian", "portuguese", "russian", "japanese"] }

[package.metadata.component]
package = "tegmentum:webfunction"
[package.metadata.component.target]
path = "../../wit"
world = "sparql-extension"